<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>선한목자교회 교적관리</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" href="logo.png">
    
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 📱 상단바 없는 완벽한 전체 화면 앱 구현용 iframe (기본 숨김) */
        #app-iframe {
            width: 100%; height: 100%; border: none;
            display: none;
        }

        /* 👆 최초 접속 시 보여줄 시작 화면 레이아웃 */
        #welcome-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #f8fafc;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 99999;
            padding: 20px; box-sizing: border-box;
            text-align: center;
        }

        .logo {
            width: 95px; height: 95px;
            object-fit: contain; margin-bottom: 24px;
            border-radius: 22px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        /* ✍️ 요구사항: 타이틀만 깔끔하게 유지 */
        .title {
            font-size: 22px; font-weight: bold; color: #1e293b; margin-bottom: 32px;
        }

        /* ✍️ 요구사항: 오직 이 버튼을 '클릭'했을 때만 실행되도록 변경 */
        .start-btn {
            background-color: #2563eb;
            color: white; font-weight: bold; font-size: 15px;
            border: none;
            padding: 14px 48px; border-radius: 30px;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .start-btn:active {
            background-color: #1d4ed8; transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <img src="logo.png" alt="교회 로고" class="logo">
        <div class="title">선한목자교회 교적관리</div>
        
        <button class="start-btn" onclick="launchApp()">시작하기</button>
    </div>

    <iframe id="app-iframe" src="" allow="clipboard-read; clipboard-write"></iframe>

    <script>
        // 🔗 선한목자교회 스트림릿 클라우드 고유 주소
        const STREAMLIT_URL = "https://gschurch.streamlit.app/"; 

        function launchApp() {
            const welcomeScreen = document.getElementById('welcome-screen');
            const iframe = document.getElementById('app-iframe');
            
            // 🚀 리디렉션 방지 팁: 사용자가 버튼을 클릭하는 순간 쿠키 유효 세션을 
            // 강제로 동기화시키기 위해 주소 뒤에 타임스탬프 값을 임의로 붙여 iframe을 로드합니다.
            iframe.src = STREAMLIT_URL + "?loaded=" + new Date().getTime();
            
            // 시작 화면을 지우고 iframe(주소창 없는 전체 화면)을 노출합니다.
            welcomeScreen.style.display = 'none';
            iframe.style.display = 'block';
        }
    </script>
</body>
</html>
