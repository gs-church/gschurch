<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>선한목자교회 교적관리</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="logo.png?v=2">
    <link rel="icon" href="logo.png?v=2">
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff;
        }
        /* 💡 사용자의 기기 설정이 다크모드일 경우 뒷배경을 부드러운 다크톤으로 자연스럽게 전환 */
        @media (prefers-color-scheme: dark) {
            body, html { background-color: #0e1117; } 
        }
        iframe {
            width: 100%; height: 100%; border: none; background-color: transparent;
        }
    </style>
</head>
<body>
    <iframe id="app-frame" src=""></iframe>

    <script>
        // 💡 요금관리 앱과 꼬이지 않도록 교적관리 전용 키(gs_member_saved_id) 사용
        const rememberedId = localStorage.getItem('gs_member_saved_id') || '';
        const streamlitUrl = "https://gschurch.streamlit.app/";
        const frame = document.getElementById('app-frame');
        
        // 강제 밝은 모드 명령(?theme.base=light)을 싹 걷어냈습니다.
        let targetUrl = streamlitUrl + "?embed=true";
        
        if (rememberedId) {
            targetUrl += "&saved_id=" + encodeURIComponent(rememberedId);
        }
        frame.src = targetUrl;

        // 아이디 저장/삭제 신호 수신기 (app.py의 window.top.postMessage와 완벽 통신)
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'SAVE_ID') {
                localStorage.setItem('gs_member_saved_id', event.data.id);
            }
            if (event.data && event.data.type === 'DELETE_ID') {
                localStorage.removeItem('gs_member_saved_id');
            }
        });
    </script>
</body>
</html>
