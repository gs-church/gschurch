<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선한목자교회 교적관리</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" href="logo.png">
    
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 📱 실제 스트림릿 앱 영역 (터치 전에는 숨김) */
        #app-iframe {
            width: 100%; height: 100%; border: none;
            display: none;
        }

        /* 👆 최초 접속 시 목사님이 요청하신 터치 안내 화면 */
        #touch-trigger-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #f8fafc;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 99999;
            cursor: pointer;
            padding: 20px; box-sizing: border-box;
            text-align: center;
        }

        .logo {
            width: 95px; height: 95px;
            object-fit: contain; margin-bottom: 24px;
            border-radius: 22px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        /* ✍️ 요청하신 타이틀 문구 */
        .title {
            font-size: 21px; font-weight: bold; color: #1e293b; margin-bottom: 12px;
        }

        /* ✍️ 요청하신 터치 실행 안내 문구 */
        .description {
            font-size: 15px; color: #475569; font-weight: 500; line-height: 1.6; margin-bottom: 30px;
        }

        /* 손가락 터치를 부드럽게 유도하는 안내 버튼 스타일 */
        .touch-action-btn {
            background-color: #2563eb;
            color: white; font-weight: bold; font-size: 14px;
            padding: 14px 32px; border-radius: 30px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="touch-trigger-screen" onclick="startAppInApp()">
        <img src="logo.png" alt="교회 로고" class="logo">
        <div class="title">선한목자교회 교적관리</div>
        <div class="description">
            화면을 터치하여 실행합니다.
        </div>
        <div class="touch-action-btn">
            👆 터치하여 시스템 시작하기
        </div>
    </div>

    <iframe id="app-iframe" src=""></iframe>

    <script>
        // 🔗 선한목자교회 스트림릿 클라우드 고유 주소 유지
        const STREAMLIT_URL = "https://gschurch.streamlit.app/"; 

        function startAppInApp() {
            const triggerScreen = document.getElementById('touch-trigger-screen');
            const iframe = document.getElementById('app-iframe');
            
            // 1. 화면을 터치하는 순간, 빈 iframe에 주소를 강제로 밀어 넣어 '강제 새로고침'을 발생시킵니다.
            iframe.src = STREAMLIT_URL;
            
            // 2. 터치 안내 화면을 스르륵 지우고 스트림릿 iframe 화면을 전체 화면으로 띄웁니다.
            triggerScreen.style.display = 'none';
            iframe.style.display = 'block';
        }
    </script>
</body>
</html>
