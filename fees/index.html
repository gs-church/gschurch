<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>선한목자교회 요금관리</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="logo.png?v=2">
    <link rel="icon" href="logo.png?v=2">
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff;
        }
        iframe {
            width: 100%; height: 100%; border: none; background-color: #ffffff;
        }
    </style>
</head>
<body>
    <iframe id="app-frame" src=""></iframe>

    <script>
        // 💡 쿠키 매니저의 기본 키값인 'util_saved_id'와 완벽 매칭 동기화
        const rememberedId = localStorage.getItem('util_saved_id') || '';
        const streamlitUrl = "https://gschurch-fees.streamlit.app/";
        const frame = document.getElementById('app-frame');
        
        // 무조건 밝은 테마 명령 고정
        let targetUrl = streamlitUrl + "?embed=true&theme.base=light";
        
        if (rememberedId) {
            targetUrl += "&saved_id=" + encodeURIComponent(rememberedId);
        }
        frame.src = targetUrl;

        // 아이디 저장/삭제 신호 수신기 (window.top.postMessage 신호 전용 규격 개편)
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'SAVE_ID') {
                localStorage.setItem('util_saved_id', event.data.id);
            }
            if (event.data && event.data.type === 'DELETE_ID') {
                localStorage.removeItem('util_saved_id');
            }
        });
    </script>
</body>
</html>
