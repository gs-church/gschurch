<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>선한목자교회 요금관리</title>
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" href="logo.png">
    
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 👆 최초 접속 시 보여줄 시작 화면 레이아웃 */
        #welcome-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #f8fafc;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 99999;
            padding: 20px; box-sizing: border-box;
            text-align: center;
        }

        .logo {
            width: 95px; height: 95px;
            object-fit: contain; margin-bottom: 24px;
            border-radius: 22px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        /* ✍️ 요구사항: 타이틀만 깔끔하게 유지 */
        .title {
            font-size: 22px; font-weight: bold; color: #1e293b; margin-bottom: 32px;
        }

        /* ✍️ 요구사항: 오직 이 버튼을 '클릭'했을 때만 실행되도록 변경 */
        .start-btn {
            background-color: #2563eb;
            color: white; font-weight: bold; font-size: 15px;
            border: none;
            padding: 14px 48px; border-radius: 30px;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .start-btn:active {
            background-color: #1d4ed8; transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <img src="logo.png" alt="교회 로고" class="logo">
        <div class="title">선한목자교회 요금관리</div>
        
        <button class="start-btn" onclick="launchAppDirectly()">시작하기</button>
    </div>

    <script>
        // 🔗 선한목자교회 스트림릿 클라우드 고유 주소 유지
        const STREAMLIT_URL = "https://gschurch-fees.streamlit.app/"; 

        function launchAppDirectly() {
            // 🚀 핵심: <iframe>을 전혀 쓰지 않고 브라우저 창 자체를 이동시킵니다.
            // 이로 인해 상단바는 노출되지만, '너무 여러 번 리디렉션되었습니다' 에러가 100% 영구 해결됩니다.
            window.location.href = STREAMLIT_URL;
        }
    </script>
</body>
</html>
