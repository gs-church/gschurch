<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선한목자교회 요금관리</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" href="logo.png">
    
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 👆 최초 접속 시 목사님이 요청하신 터치 안내 화면 */
        #touch-trigger-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #f8fafc;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 99999;
            cursor: pointer;
            padding: 20px; box-sizing: border-box;
            text-align: center;
        }

        .logo {
            width: 95px; height: 95px;
            object-fit: contain; margin-bottom: 24px;
            border-radius: 22px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        /* ✍️ 요청하신 타이틀 문구 */
        .title {
            font-size: 21px; font-weight: bold; color: #1e293b; margin-bottom: 12px;
        }

        /* ✍️ 요청하신 터치 실행 안내 문구 */
        .description {
            font-size: 15px; color: #475569; font-weight: 500; line-height: 1.6; margin-bottom: 30px;
        }

        /* 터치 유도 애니메이션 버튼 */
        .touch-action-btn {
            background-color: #2563eb;
            color: white; font-weight: bold; font-size: 14px;
            padding: 14px 32px; border-radius: 30px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="touch-trigger-screen" onclick="startAppDirectly()">
        <img src="logo.png" alt="교회 로고" class="logo">
        <div class="title">선한목자교회 요금관리</div>
        <div class="description">
            화면을 터치하여 실행합니다.
        </div>
        <div class="touch-action-btn">
            👆 터치하여 시스템 시작하기
        </div>
    </div>

    <script>
        // 🔗 선한목자교회 스트림릿 클라우드 고유 주소
        const STREAMLIT_URL = "https://gschurch-fees.streamlit.app/"; 

        function startAppDirectly() {
            // 🚀 핵심 수정: iframe을 사용하지 않고, 현재 홈 앱 창의 주소 자체를 스트림릿으로 다이렉트 전환합니다.
            // 이렇게 하면 독립된 단일 브라우저 세션으로 인식되어 쿠키 보안 차단(리디렉션 에러)이 완벽히 해결됩니다.
            window.location.href = STREAMLIT_URL;
        }
    </script>
</body>
</html>
