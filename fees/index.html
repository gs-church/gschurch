<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>선한목자교회 요금관리</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="logo.png?v=2">
    <link rel="icon" href="logo.png?v=2">
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff;
        }
        /* 💡 다크모드 설정 시 액자 창 배경색도 부드러운 다크톤으로 자연스럽게 전환 */
        @media (prefers-color-scheme: dark) {
            body, html { background-color: #0e1117; } 
        }
        iframe {
            width: 100%; height: 100%; border: none; background-color: transparent;
        }
    </style>
</head>
<body>
    <iframe id="app-frame" src=""></iframe>

    <script>
        // 💡 쿠키 매니저의 기본 키값인 'util_saved_id'와 완벽 매칭 동기화
        const rememberedId = localStorage.getItem('util_saved_id') || '';
        const streamlitUrl = "https://gschurch-fees.streamlit.app/";
        const frame = document.getElementById('app-frame');
        
        // 강제 밝은 모드 명령어 싹 삭제 (이제 기기 설정에 맞춰 자동 변경됩니다.)
        let targetUrl = streamlitUrl + "?embed=true";
        
        if (rememberedId) {
            targetUrl += "&saved_id=" + encodeURIComponent(rememberedId);
        }
        frame.src = targetUrl;

        // 아이디 저장/삭제 신호 수신기 (app.py 내부의 window.top.postMessage 규격과 일치화)
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'SAVE_ID') {
                localStorage.setItem('util_saved_id', event.data.id);
            }
            if (event.data && event.data.type === 'DELETE_ID') {
                localStorage.removeItem('util_saved_id');
            }
        });
    </script>
</body>
</html>
